<!DOCTYPE html>
<html>
<head>
  <title>MyOperator ROI Calculator</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      width: 340px;
      color: white;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      box-shadow: 0 0 10px #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #00f2fe;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4facfe;
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .profit { color: #00ffcc; }
    .loss { color: #ff4d4d; }

  </style>
</head>

<body>

<div class="card">
  <h2>📞 MyOperator ROI</h2>

  <input type="number" id="cost" placeholder="Monthly Plan Cost (₹)">
  <input type="number" id="leads" placeholder="Extra Leads / Month">
  <input type="number" id="conversion" placeholder="Conversion Rate (%)">
  <input type="number" id="avg" placeholder="Avg Revenue / Customer (₹)">

  <button onclick="calc()">Calculate ROI 🚀</button>

  <div id="result"></div>
</div>

<script>
function calc() {
  let cost = document.getElementById("cost").value;
  let leads = document.getElementById("leads").value;
  let conversion = document.getElementById("conversion").value / 100;
  let avg = document.getElementById("avg").value;

  if (!cost || cost == 0) {
    document.getElementById("result").innerText = "⚠️ Enter valid cost";
    return;
  }

  let revenue = leads * conversion * avg;
  let roi = ((revenue - cost) / cost) * 100;

  let resultBox = document.getElementById("result");

  if (roi >= 0) {
    resultBox.className = "profit";
    resultBox.innerText = "🔥 ROI: " + roi.toFixed(2) + "% Profit";
  } else {
    resultBox.className = "loss";
    resultBox.innerText = "⚠️ ROI: " + roi.toFixed(2) + "% Loss";
  }
}
</script>

</body>
</html>
